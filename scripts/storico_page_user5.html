<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Storico buste paga - BPIC</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --line: #e5e7eb;
      --txt: #0f172a;
      --muted: #64748b;
      --brand: #2563eb;
      --sidebar: #0f172a;
      --sidebar-soft: #1e293b;
      --green-bg: #ecfdf5;
      --green-txt: #047857;
      --gray-bg: #f1f5f9;
      --red-bg: #fef2f2;
      --red-txt: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--txt);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      background: linear-gradient(180deg, var(--sidebar), #111827);
      color: #e2e8f0;
      padding: 20px;
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .user {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 18px;
      word-break: break-word;
    }

    .menu {
      display: grid;
      gap: 8px;
    }

    .menu a {
      text-decoration: none;
      color: #e2e8f0;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.3);
    }

    .menu a:hover,
    .menu a.active {
      background: var(--sidebar-soft);
      border-color: rgba(148, 163, 184, 0.6);
    }

    .content {
      padding: 24px;
    }

    .head {
      margin-bottom: 16px;
    }

    .head h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1.1;
    }

    .head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 18px;
    }

    .notice {
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 700;
    }

    .notice.ok {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .notice.err {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
      padding: 16px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .month {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .date {
      color: var(--muted);
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      border-radius: 12px;
      padding: 12px;
    }

    .box small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .box strong {
      font-size: 30px;
      line-height: 1;
    }

    .box.netto { background: var(--green-bg); }
    .box.netto strong { color: var(--green-txt); }
    .box.lordo { background: var(--gray-bg); }
    .box.tasse { background: var(--red-bg); }
    .box.tasse strong { color: var(--red-txt); }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 700;
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
    }

    .btn.del {
      border-color: #fecaca;
      background: #fef2f2;
      color: #dc2626;
    }
