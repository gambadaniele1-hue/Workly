<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BPIC Mockup viste</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0: #f5f2ea;
            --bg-1: #fffdf8;
            --ink: #1c1a15;
            --muted: #676055;
            --card: #fff9ef;
            --line: #e7decd;
            --accent: #0b8f77;
            --accent-soft: #d6f4ec;
            --admin: #c06a2a;
            --admin-soft: #ffe7d5;
            --shadow: 0 10px 40px rgba(61, 50, 28, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 5% 10%, #efe4d4 0%, transparent 35%),
                radial-gradient(circle at 90% 0%, #d4ece8 0%, transparent 35%),
                linear-gradient(180deg, var(--bg-0), var(--bg-1));
            min-height: 100vh;
        }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 20px 72px;
        }

        /* ── Hero ── */
        .hero {
            background: rgba(255, 249, 239, 0.8);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 28px;
            position: relative;
            overflow: hidden;
            animation: reveal 500ms ease-out;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: linear-gradient(160deg, rgba(11, 143, 119, 0.2), rgba(192, 106, 42, 0.15));
            right: -60px;
            top: -80px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(28px, 4vw, 44px);
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            max-width: 760px;
        }
